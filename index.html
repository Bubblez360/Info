<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Angelo Depamaylo — Full-Stack Developer & IT Specialist</title>
    <meta
      name="description"
      content="Angelo &quot;Deps&quot; Depamaylo — full-stack developer from Zamboanga City, PH. Builder of TindaPOS and software that replaces manual work. BSIT graduate, ZPPSU 2026."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#faf9fc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#232028" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph / Twitter — %VITE_SITE_URL% replaced at build from .env / Vercel env (decision F6) -->
    <link rel="canonical" href="%VITE_SITE_URL%/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:title" content="Angelo Depamaylo — Full-Stack Developer & IT Specialist" />
    <meta
      property="og:description"
      content="Builder of TindaPOS and software that replaces manual work. Zamboanga City, PH."
    />
    <meta property="og:image" content="%VITE_SITE_URL%/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="%VITE_SITE_URL%/og.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Angelo Depamaylo",
        "alternateName": "Bubblez360",
        "jobTitle": "Full-Stack Developer",
        "email": "mailto:depamaylo.angelo360@gmail.com",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Zamboanga City",
          "addressCountry": "PH"
        },
        "alumniOf": "Zamboanga Peninsula Polytechnic State University",
        "sameAs": ["https://github.com/Bubblez360"]
      }
    </script>

    <!-- theme init before paint: no flash of wrong theme -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('theme')
          var dark = t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {
          /* default light */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
