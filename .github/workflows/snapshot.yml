# Weekly GitHub stats snapshot (decisions F1/E1).
# The commit is both the data refresh AND repo activity — scheduled workflows
# get suspended after 60 days of repo inactivity; this loop prevents that.
# If the API call fails, the job fails loudly and GitHub emails the owner.
# workflow_dispatch = manual re-run button for silently-skipped crons.
name: refresh-github-snapshot

on:
  schedule:
    - cron: '0 0 * * 0' # Sundays 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate snapshot
        run: node scripts/snapshot.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/snapshot.json
          git diff --cached --quiet || git commit -m "chore: weekly GitHub snapshot refresh"
          git push
